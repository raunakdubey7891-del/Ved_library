<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Ved Library · Study Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0f;
  --bg-elevated: #111115;
  --surface: #1c1c22;
  --card-bg: rgba(20, 20, 28, 0.75);
  --border: rgba(255, 255, 255, 0.06);
  --border-light: rgba(255, 255, 255, 0.1);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #5b677b;
  --accent: #8b5cf6;
  --accent-glow: rgba(139, 92, 246, 0.2);
  --accent-soft: #7c3aed;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

button, input, select, textarea {
  font-family: inherit;
  border: none;
  outline: none;
  background: none;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.glass-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}

#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  z-index: 9999;
}

.loader-logo {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: white;
  box-shadow: 0 0 30px var(--accent-glow);
}

.loader-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid rgba(139, 92, 246, 0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.08), transparent 60%);
}

.auth-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.brand-large {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 28px;
}

.brand-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: white;
}

.brand-text {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.auth-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

.auth-sub {
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.google-btn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-weight: 600;
  color: var(--text-primary);
  transition: all 0.2s;
}

.google-btn:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  background: rgba(10, 10, 15, 0.85);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-mark {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 18px;
}

.logo-full {
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.2px;
  background: linear-gradient(135deg, #fff, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

@media (max-width: 640px) {
  .logo-full {
    display: inline-block !important;
    font-size: 16px;
  }
  .logo-mark {
    width: 32px;
    height: 32px;
    font-size: 16px;
  }
}

.user-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.role-badge {
  background: rgba(139, 92, 246, 0.15);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
}

.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  margin-top: 8px;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-primary:hover {
  background: var(--accent-soft);
  transform: translateY(-1px);
}

.btn-outline {
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-secondary);
}

.btn-outline:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--accent);
}

.table-wrapper {
  overflow-x: auto;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

th {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

tr:last-child td {
  border-bottom: none;
}

.seat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}

.seat-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  transition: all 0.2s;
}

.seat-occupied {
  border-color: var(--accent);
  background: rgba(139, 92, 246, 0.05);
}

.seat-number {
  font-weight: 700;
  font-size: 18px;
}

.tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 4px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.tab {
  padding: 8px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: var(--surface);
  color: var(--text-primary);
}

.tab-pane {
  display: none;
}

.tab-pane.active {
  display: block;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}

.modal-container {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 440px;
  padding: 28px;
}

@media (max-width: 640px) {
  .main-content { padding: 20px 16px; }
  .auth-card { padding: 28px 20px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .tab { padding: 6px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-logo">V</div>
  <div class="loader-spinner"></div>
  <span style="color:#94a3b8; font-size:13px;">Ved Library</span>
</div>

<!-- AUTH PAGE -->
<div id="auth-page" class="hidden">
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand-large">
        <div class="brand-icon">V</div>
        <span class="brand-text">Ved Library</span>
      </div>
      <h1 class="auth-title">Study starts here</h1>
      <p class="auth-sub">Sign in to access your library dashboard</p>
      <button id="google-login-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        <span id="google-btn-text">Continue with Google</span>
      </button>
      <p style="font-size:12px; color:#5b677b; margin-top:20px;">New students are registered automatically</p>
    </div>
  </div>
</div>

<!-- REGISTRATION PAGE -->
<div id="reg-page" class="hidden">
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand-large"><div class="brand-icon">📝</div><span class="brand-text">Complete Profile</span></div>
      <div id="reg-error" class="hidden" style="background:#ef44441a; color:#f87171; padding:10px; border-radius:8px; margin-bottom:16px;"></div>
      <div style="display:flex; flex-direction:column; gap:12px;">
        <input id="reg-phone" placeholder="Phone Number" style="background:#1c1c22; border:1px solid #2c2c32; border-radius:10px; padding:12px; color:white;"/>
        <input id="reg-aadhaar" placeholder="12-digit Aadhaar" maxlength="12" style="background:#1c1c22; border:1px solid #2c2c32; border-radius:10px; padding:12px; color:white;"/>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div><div style="font-size:12px; margin-bottom:6px;">Profile Photo</div><div id="photo-upload-area" style="background:#1c1c22; border:1px dashed #3c3c44; border-radius:12px; padding:12px; text-align:center; cursor:pointer;" onclick="document.getElementById('photo-input').click()"><span>📷 Upload</span><img id="photo-preview" style="max-width:100%; margin-top:6px; border-radius:8px;" class="hidden"/></div><input type="file" id="photo-input" accept="image/*" class="hidden"/></div>
          <div><div style="font-size:12px; margin-bottom:6px;">Aadhaar Photo</div><div id="aadhaar-upload-area" style="background:#1c1c22; border:1px dashed #3c3c44; border-radius:12px; padding:12px; text-align:center; cursor:pointer;" onclick="document.getElementById('aadhaar-input').click()"><span>🪪 Upload</span><img id="aadhaar-preview" style="max-width:100%; margin-top:6px; border-radius:8px;" class="hidden"/></div><input type="file" id="aadhaar-input" accept="image/*" class="hidden"/></div>
        </div>
        <label style="display:flex; gap:10px; align-items:center;"><input type="checkbox" id="reg-agree"/> <span style="font-size:13px;">I agree to library rules</span></label>
        <button class="btn btn-primary" id="reg-submit-btn" onclick="submitRegistration()" style="width:100%; justify-content:center;">Complete Registration</button>
      </div>
    </div>
  </div>
</div>

<script>
// ========== SUPABASE CONFIG ==========
const SUPABASE_URL = 'https://dmolzoagnzjwtrdroqeg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtb2x6b2Fnbnpqd3RyZHJvcWVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODUxODEsImV4cCI6MjA5MDg2MTE4MX0.5Culb-inMvITeplysy6_BJJXngd_SPMWG13_hT0GV5w';
const ADMIN_EMAIL = 'raunakdubey7891@gmail.com';
const LIBRARY_LAT = 28.6139;
const LIBRARY_LON = 77.2090;
const LIBRARY_RADIUS_KM = 0.5;

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ========== GLOBAL STATE ==========
let currentUser = null;
let currentProfile = null;
let allStudents = [];
let allSeats = [];
let allPayments = [];
let allAttendance = [];
let allNotices = [];
let photoBase64 = null;
let aadhaarBase64 = null;
let initDone = false;

const STUDY_PLANS = { full_time:'Full Time (12h)', shift_a:'Shift A (4h)', shift_b:'Shift B (4h)', custom:'Custom Shift' };
const PLAN_PRICES = { full_time:1200, shift_a:500, shift_b:500, custom:800 };

const $ = id => document.getElementById(id);
const hide = id => { const el = $(id); if(el) el.classList.add('hidden'); };
const show = id => { const el = $(id); if(el) el.classList.remove('hidden'); };
const today = () => new Date().toISOString().slice(0,10);
const fmt = iso => iso ? new Date(iso).toLocaleDateString('en-IN') : 'N/A';

// ========== FIXED INIT - NO INFINITE LOADING ==========
async function init() {
  show('loading-screen');
  hide('auth-page');
  hide('app');
  hide('reg-page');

  try {
    // Check existing session first
    const { data: { session }, error } = await db.auth.getSession();
    
    if (error) throw error;
    
    if (session?.user) {
      await onSignIn(session.user);
    } else {
      // No session, show login
      hide('loading-screen');
      show('auth-page');
    }
  } catch (err) {
    console.error('Init error:', err);
    hide('loading-screen');
    show('auth-page');
  }

  // Listen for auth changes (for future logins/logouts)
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      await onSignIn(session.user);
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      currentProfile = null;
      initDone = false;
      hide('app');
      hide('reg-page');
      show('auth-page');
    }
  });
}

async function onSignIn(user) {
  if (initDone && currentUser?.id === user.id) return;
  
  try {
    currentUser = user;
    let { data: profile, error } = await db.from('users').select('*').eq('uid', user.id).single();
    
    if (error && error.code !== 'PGRST116') throw error;
    
    if (!profile) {
      const isAdmin = user.email === ADMIN_EMAIL;
      const np = {
        uid: user.id,
        name: user.user_metadata?.full_name || user.email,
        email: user.email,
        role: isAdmin ? 'admin' : 'student',
        created_at: new Date().toISOString()
      };
      const { data: created } = await db.from('users').insert(np).select().single();
      profile = created;
    }
    
    currentProfile = profile;
    initDone = true;
    hide('loading-screen');
    hide('auth-page');
    
    if (profile.role === 'student' && !profile.registration_completed) {
      show('reg-page');
      return;
    }
    
    launchApp();
  } catch (e) {
    console.error('Sign-in error:', e);
    currentUser = null;
    initDone = false;
    hide('loading-screen');
    show('auth-page');
  }
}

function launchApp() {
  show('app');
  document.getElementById('nav-user-name').textContent = currentProfile.name;
  const roleEl = document.getElementById('nav-user-role');
  roleEl.textContent = currentProfile.role === 'admin' ? 'Admin' : 'Student';
  
  if (currentProfile.role === 'admin') {
    show('admin-dashboard');
    loadAdminData();
  } else {
    show('student-dashboard');
    loadStudentData();
  }
}

async function logout() {
  await db.auth.signOut();
  location.reload();
}

// Google login
document.getElementById('google-login-btn').onclick = async () => {
  const btn = document.getElementById('google-login-btn');
  btn.disabled = true;
  document.getElementById('google-btn-text').textContent = 'Connecting...';
  try {
    await db.auth.signInWithOAuth({ 
      provider: 'google', 
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  } catch(e) {
    alert('Login failed: ' + e.message);
    btn.disabled = false;
    document.getElementById('google-btn-text').textContent = 'Continue with Google';
  }
};

// ========== STUDENT FUNCTIONS ==========
async function loadStudentData() {
  const p = currentProfile;
  document.getElementById('student-welcome').textContent = `Welcome, ${p.name}`;
  document.getElementById('student-seat-num').textContent = p.seat_number || '—';
  document.getElementById('student-plan-name').textContent = STUDY_PLANS[p.plan_id] || 'No plan';
  document.getElementById('amount-due').textContent = `₹${p.amount_due || 0}`;
  
  if (p.expiry_date) {
    const exp = new Date(p.expiry_date);
    const diff = Math.max(0, Math.floor((exp - new Date()) / 86400000));
    document.getElementById('days-remaining').textContent = diff;
    document.getElementById('expiry-text').textContent = `Expiry: ${fmt(p.expiry_date)}`;
    const pbar = document.getElementById('subscription-progress');
    if(pbar) pbar.style.width = Math.min(100, (diff / 30) * 100) + '%';
  }
  
  const { data: todayAttend } = await db.from('attendance').select('*').eq('uid', currentUser.id).eq('date', today()).maybeSingle();
  updateAttendanceUI(!!todayAttend);
  
  const { data: notices } = await db.from('notices').select('*').order('created_at', { ascending: false });
  allNotices = notices || [];
  renderNoticeList('student-notices-list', false);
}

function updateAttendanceUI(marked) {
  const dot = document.getElementById('attend-status-dot');
  const text = document.getElementById('attend-status-text');
  if(marked) {
    dot.style.background = '#10b981';
    text.textContent = 'Marked Today';
  } else {
    dot.style.background = '#f59e0b';
    text.textContent = 'Not Marked';
  }
}

async function markAttendance() {
  const errDiv = document.getElementById('student-location-error');
  errDiv.classList.add('hidden');
  try {
    const loc = await getLocation();
    if(!isAtLibrary(loc.lat, loc.lon)) {
      errDiv.textContent = 'You must be at the library to mark attendance.';
      errDiv.classList.remove('hidden');
      return;
    }
    await db.from('attendance').upsert({ 
      id: `${currentUser.id}_${today()}`, 
      uid: currentUser.id, 
      date: today(), 
      timestamp: new Date().toISOString(), 
      status: 'present' 
    });
    updateAttendanceUI(true);
  } catch(e) {
    errDiv.textContent = e.message || 'Location error. Please allow location access.';
    errDiv.classList.remove('hidden');
  }
}

function getLocation() {
  return new Promise((res, rej) => {
    if(!navigator.geolocation) rej(new Error('Geolocation not supported'));
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
      () => rej(new Error('Location permission denied'))
    );
  });
}

function isAtLibrary(lat, lon) {
  const R = 6371;
  const dLat = (lat - LIBRARY_LAT) * Math.PI / 180;
  const dLon = (lon - LIBRARY_LON) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(LIBRARY_LAT * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) <= LIBRARY_RADIUS_KM;
}

function showPaymentModal() {
  const amt = currentProfile.amount_due || 0;
  document.getElementById('payment-modal-desc').textContent = `Pay ₹${amt} using any UPI app`;
  document.getElementById('payment-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=raunakdubey7891@ybl&pn=Ved%20Library&am=${amt}&cu=INR`;
  document.getElementById('utr-input').value = '';
  show('payment-modal');
}

async function submitPayment() {
  const utr = document.getElementById('utr-input')?.value?.trim();
  if(!utr) { alert('Enter UTR number'); return; }
  await db.from('payments').insert({ 
    uid: currentUser.id, 
    amount: currentProfile.amount_due || 0, 
    transaction_id: utr, 
    status: 'pending', 
    timestamp: new Date().toISOString() 
  });
  alert('Payment submitted for verification');
  closeModal('payment-modal');
}

// ========== ADMIN FUNCTIONS ==========
async function loadAdminData() {
  await Promise.all([fetchStudents(), fetchSeats(), fetchPayments(), fetchAttendance(), fetchNotices()]);
  renderAll();
}

async function fetchStudents() { const { data } = await db.from('users').select('*').eq('role','student'); allStudents = data || []; }
async function fetchSeats() { const { data } = await db.from('seats').select('*'); allSeats = data || []; }
async function fetchPayments() { const { data } = await db.from('payments').select('*').order('timestamp',{ascending:false}); allPayments = data || []; }
async function fetchAttendance() { const { data } = await db.from('attendance').select('*').order('timestamp',{ascending:false}); allAttendance = data || []; }
async function fetchNotices() { const { data } = await db.from('notices').select('*').order('created_at',{ascending:false}); allNotices = data || []; }

function renderAll() {
  renderStudentTable();
  renderSeats();
  renderPayments();
  renderAttendanceList();
  renderNoticeList('admin-notices-list', true);
  renderStats();
}

function renderStudentTable() {
  const tbody = document.getElementById('students-tbody');
  if(!tbody) return;
  tbody.innerHTML = allStudents.map(s => `
    <tr>
      <td><div style="font-weight:600">${escapeHtml(s.name)}</div><div style="font-size:12px;color:#94a3b8">${escapeHtml(s.email)}</div></td>
      <td><span class="role-badge">${s.seat_number || '—'}</span></td>
      <td>${STUDY_PLANS[s.plan_id] || '—'}</td>
      <td>${fmt(s.expiry_date)}</td>
      <td style="color:${(s.amount_due||0)>0?'#f87171':'#34d399'}">₹${s.amount_due||0}</td>
      <td><button class="btn btn-outline" style="padding:4px 10px;" onclick="openEditModal('${s.uid}')">Edit</button></td>
    </tr>
  `).join('');
}

function renderSeats() {
  const grid = document.getElementById('seats-grid');
  if(!grid) return;
  grid.innerHTML = allSeats.map(seat => `
    <div class="seat-card ${seat.status === 'occupied' ? 'seat-occupied' : ''}">
      <div style="display:flex; justify-content:space-between;">
        <span class="seat-number">${escapeHtml(seat.number)}</span>
        <button class="btn btn-outline" style="padding:2px 6px;" onclick="removeSeat('${seat.id}')">🗑</button>
      </div>
      <div style="font-size:12px; margin-top:8px;">${seat.status === 'occupied' ? '👤 Occupied' : '🟢 Available'}</div>
    </div>
  `).join('');
}

function renderPayments() {
  const el = document.getElementById('payments-list');
  if(!el) return;
  el.innerHTML = allPayments.map(p => {
    const s = allStudents.find(x => x.uid === p.uid);
    return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);">
      <div><strong>${escapeHtml(s?.name || 'Unknown')}</strong><br/><span style="font-size:11px;">UTR: ${p.transaction_id}</span></div>
      <div>₹${p.amount}<br/><span style="font-size:11px; color:${p.status==='verified'?'#10b981':'#f59e0b'}">${p.status}</span></div>
    </div>`;
  }).join('');
  if(!allPayments.length) el.innerHTML = '<div class="empty-text">No payments</div>';
}

function renderAttendanceList() {
  const el = document.getElementById('attendance-list');
  if(!el) return;
  el.innerHTML = allAttendance.slice(0,50).map(a => {
    const s = allStudents.find(x => x.uid === a.uid);
    return `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
      <span>${escapeHtml(s?.name || 'Unknown')}</span><span style="font-size:12px;">${a.date}</span>
    </div>`;
  }).join('');
}

function renderNoticeList(elId, isAdmin) {
  const el = document.getElementById(elId);
  if(!el) return;
  el.innerHTML = allNotices.map(n => `
    <div class="glass-card" style="padding:16px; margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between;">
        <strong>${escapeHtml(n.title)}</strong>
        <span style="font-size:11px; color:#94a3b8;">${fmt(n.created_at)}</span>
      </div>
      <p style="margin-top:8px; font-size:13px;">${escapeHtml(n.content)}</p>
    </div>
  `).join('');
  if(!allNotices.length) el.innerHTML = '<div class="empty-text">No notices</div>';
}

function renderStats() {
  document.getElementById('stat-students').textContent = allStudents.length;
  document.getElementById('stat-today').textContent = new Set(allAttendance.filter(a=>a.date===today()).map(a=>a.uid)).size;
  document.getElementById('stat-occupied').textContent = allSeats.filter(s=>s.status==='occupied').length;
  document.getElementById('stat-available').textContent = allSeats.filter(s=>s.status==='available').length;
  document.getElementById('stat-revenue').textContent = '₹' + allPayments.filter(p=>p.status==='verified').reduce((s,p)=>s+p.amount,0);
  document.getElementById('stat-pending-due').textContent = '₹' + allStudents.reduce((s,st)=>s+(st.amount_due||0),0);
}

function openEditModal(uid) {
  const s = allStudents.find(x=>x.uid===uid);
  if(!s) return;
  document.getElementById('edit-uid').value = uid;
  document.getElementById('edit-name').value = s.name || '';
  document.getElementById('edit-seat').value = s.seat_number || '';
  document.getElementById('edit-plan').value = s.plan_id || '';
  document.getElementById('edit-session-start').value = s.session_start ? s.session_start.slice(0,10) : '';
  document.getElementById('edit-expiry').value = s.expiry_date ? s.expiry_date.slice(0,10) : '';
  document.getElementById('edit-amount-due').value = s.amount_due || 0;
  show('edit-student-modal');
}

async function saveStudentEdit() {
  const uid = document.getElementById('edit-uid').value;
  await db.from('users').update({
    seat_number: document.getElementById('edit-seat').value || null,
    plan_id: document.getElementById('edit-plan').value || null,
    session_start: document.getElementById('edit-session-start').value || null,
    expiry_date: document.getElementById('edit-expiry').value || null,
    amount_due: parseInt(document.getElementById('edit-amount-due').value) || 0
  }).eq('uid', uid);
  closeModal('edit-student-modal');
  await fetchStudents();
  renderAll();
}

async function deleteStudent() {
  if(!confirm('Delete this student permanently?')) return;
  const uid = document.getElementById('edit-uid').value;
  await db.from('users').delete().eq('uid', uid);
  closeModal('edit-student-modal');
  await fetchStudents();
  renderAll();
}

async function addSeat() {
  const num = document.getElementById('new-seat-num')?.value?.trim();
  if(!num) return;
  await db.from('seats').insert({ id: `seat_${Date.now()}`, number: num, status: 'available' });
  closeModal('add-seat-modal');
  await fetchSeats();
  renderSeats();
}

async function removeSeat(id) {
  if(!confirm('Delete seat?')) return;
  await db.from('seats').delete().eq('id', id);
  await fetchSeats();
  renderSeats();
}

function showAddSeatModal() { show('add-seat-modal'); }
function showAddNoticeModal() { show('add-notice-modal'); }

async function addNotice() {
  const title = document.getElementById('notice-title-input')?.value?.trim();
  const content = document.getElementById('notice-content-input')?.value?.trim();
  if(!title || !content) return;
  await db.from('notices').insert({ title, content, created_at: new Date().toISOString(), author_id: currentUser?.id });
  closeModal('add-notice-modal');
  await fetchNotices();
  renderNoticeList('admin-notices-list', true);
}

function switchTab(event, tab) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
  if(event?.target) event.target.classList.add('active');
}

function exportCSV(type) {
  alert('CSV export ready');
}

async function exportAllData() {
  alert('Export started - check downloads');
  const d = today();
  // Simple CSV download for students
  let csv = "Name,Email,Seat,Plan,Expiry,Due\n";
  allStudents.forEach(s => {
    csv += `"${s.name || ''}","${s.email || ''}","${s.seat_number || ''}","${STUDY_PLANS[s.plan_id] || ''}","${fmt(s.expiry_date)}",${s.amount_due || 0}\n`;
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `VedLibrary_Students_${d}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function closeModal(id) { hide(id); }

function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

async function submitRegistration() {
  const phone = document.getElementById('reg-phone')?.value?.trim();
  const aadhaar = document.getElementById('reg-aadhaar')?.value?.trim();
  const agreed = document.getElementById('reg-agree')?.checked;
  if(!phone || !aadhaar || !agreed) {
    alert('Please fill all fields and agree to rules');
    return;
  }
  await db.from('users').update({ phone, aadhaar_number: aadhaar, registration_completed: true }).eq('uid', currentUser.id);
  const { data } = await db.from('users').select('*').eq('uid', currentUser.id).single();
  currentProfile = data;
  hide('reg-page');
  launchApp();
}

// Handle file uploads for registration
window.handleFileUpload = function(input, type) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onloadend = () => {
    if(type === 'photo') {
      photoBase64 = reader.result;
      const preview = document.getElementById('photo-preview');
      preview.src = reader.result;
      preview.classList.remove('hidden');
    } else {
      aadhaarBase64 = reader.result;
      const preview = document.getElementById('aadhaar-preview');
      preview.src = reader.result;
      preview.classList.remove('hidden');
    }
  };
  reader.readAsDataURL(file);
};

window.removeFile = function(e, type) {
  e.stopPropagation();
  if(type === 'photo') {
    photoBase64 = null;
    document.getElementById('photo-preview').classList.add('hidden');
    document.getElementById('photo-input').value = '';
  } else {
    aadhaarBase64 = null;
    document.getElementById('aadhaar-preview').classList.add('hidden');
    document.getElementById('aadhaar-input').value = '';
  }
};

// Expose functions globally
window.markAttendance = markAttendance;
window.showPaymentModal = showPaymentModal;
window.submitPayment = submitPayment;
window.closeModal = closeModal;
window.logout = logout;
window.switchTab = switchTab;
window.exportCSV = exportCSV;
window.exportAllData = exportAllData;
window.openEditModal = openEditModal;
window.saveStudentEdit = saveStudentEdit;
window.deleteStudent = deleteStudent;
window.showAddSeatModal = showAddSeatModal;
window.addSeat = addSeat;
window.removeSeat = removeSeat;
window.showAddNoticeModal = showAddNoticeModal;
window.addNotice = addNotice;
window.submitRegistration = submitRegistration;

// Start app
init();
</script>
